name: Terraform + Ansible Deploy
on:
  workflow_dispatch:
    inputs:
      tf_action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan


jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: generate variable.tfvars
      working-directory: terraform
      run: |
        cat <<EOF > terraform.tfvars
        key_name = "${{ secrets.TF_VAR_key_name }}"
        db_password = "${{ secrets.TF_VAR_db_password }}"
        domain_name = "${{ secrets.TF_VAR_domain_name }}"
        EOF

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: terraform
      run: terraform init

    - name: Terraform validate
      working-directory: terraform
      run: terraform validate
      
    - name: Terraform plan
      if: github.event.inputs.tf_action == 'plan'
      working-directory: terraform
      run: terraform plan

    - name: Terraform Apply
      if: github.event.inputs.tf_action == 'apply'
      working-directory: terraform
      run: terraform apply -auto-approve

    - name: Terraform Destroy
      if: github.event.inputs.tf_action == 'destroy'
      working-directory: terraform
      run: terraform destroy -auto-approve

    - name: Capture Terraform Outputs
      if: github.event.inputs.tf_action == 'apply'
      working-directory: terraform
      run: |
        echo "APP_IP=$(terraform output -raw app_node_ip)" >> $GITHUB_ENV
        echo "NGINX_IP=$(terraform output -raw nginx_node_ip)" >> $GITHUB_ENV
        echo "BASTION_IP=$(terraform output -raw bastion_node_ip)" >> $GITHUB_ENV

    - name: Show Outputs
      if: github.event.inputs.tf_action == 'apply'
      run: |
        echo "App Node IP: ${{ env.APP_IP }}"
        echo "Bastion Node IP: ${{ env.BASTION_IP }}"
        echo "Domain Name: ${{ secrets.TF_VAR_domain_name }}"
        echo "POSTGRES-DB IP: ${{ env.DB_IP }}"

    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/ec2.pem
        chmod 400 ~/.ssh/ec2.pem

    - name: Install Ansible
      run: |
        sudo apt update
        sudo apt install -y ansible

    - name: Build Ansible Inventory
      run: |
        cat <<EOF > terraform/inventory.ini

        [app]
        ${APP_IP} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/${{ secrets.TF_VAR_key_name }}.pem

        [bastion]
        ${BASTION_IP} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/${{ secrets.TF_VAR_key_name }}.pem

         [db]
        ${DB_IP} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/${{ secrets.TF_VAR_key_name }}.pem

        EOF 
    - name: Display Inventory
      run: cat terraform/inventory.ini

    # - name: test SSH Connection
    #   run: |
    #     ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2.pem ec2-user@${NGINX_IP} "echo 'SSH to Nginx successful!'"
    #     # ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2.pem ec2-user@${APP_IP} "echo 'SSH to App successful!'"

    - name: Validate Ansible Inventory
      run: ansible bastion -i terraform/inventory.ini -m ping

    - name: Validate Ansible Inventory for DB
      run: ansible db -i terraform/inventory.ini -m ping

    - name: Run Ansible OS Hardening
      run: ansible-playbook -i terraform/inventory.ini ansible/ansible-playbook.yml

    - name: Run Ansible Playbook
      run: |
        ansible-playbook -i terraform/inventory.ini playbooks/site.yml

    