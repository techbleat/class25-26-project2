---
- name: Configure Bastion and App Servers
  hosts: all
  become: true
  gather_facts: true

  tasks:

    # -----------------------------
    # Bastion server tasks
    # -----------------------------
    - name: Install Nginx on Bastion
      when: "'bastion' in group_names"
      apt:
        name: nginx
        update_cache: yes
        state: present

    - name: Configure reverse proxy on Bastion
      when: "'bastion' in group_names"
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
              listen 80;
              location / {
                  proxy_pass http://{{ hostvars['app_servers'].inventory_hostname }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }

    - name: Enable Nginx site
      when: "'bastion' in group_names"
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Restart Nginx on Bastion
      when: "'bastion' in group_names"
      service:
        name: nginx
        state: restarted

    # -----------------------------
    # App server tasks
    # -----------------------------
    - name: Update apt cache on App Server
      when: "'app_servers' in group_names"
      apt:
        update_cache: yes

    - name: Install required packages on App Server
      when: "'app_servers' in group_names"
      apt:
        name:
          - git
          - curl
          - python3
          - python3-apt
        state: present

    - name: Start Nginx on App Server (if needed for app)
      when: "'app_servers' in group_names"
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Ensure Nginx is running on App Server
      when: "'app_servers' in group_names"
      service:
        name: nginx
        state: started
        enabled: yes