---
- name: Configure App Server
  hosts: app_servers
  become: true

  tasks:

    - name: Bootstrap python dependency
      raw: sudo apt-get update -y && sudo apt-get install -y python3-apt

    - name: Install packages
      apt:
        name:
          - nginx
          - git
          - curl
        state: present

    - name: Start nginx
      service:
        name: nginx
        state: started
        enabled: yes